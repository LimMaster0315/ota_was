services:
  ota-server:
    build: .
    container_name: ota-download-server
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_SECRET_KEY: "change-this-secret-key"
      OTA_FILE_ROOT: "/app/ota_files"
      OTA_DOWNLOAD_MAP: '{"ml":"ml/firmware.bin"}'
    volumes:
      - ./ota_files:/app/ota_files:ro
